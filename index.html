<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>21Kaetys Blog</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --primary: #0a66ff;
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #1a1a1a;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121212;
    --card: #1e1e1e;
    --text: #ffffff;
  }
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.header {
  background: var(--primary);
  color: white;
  padding: 18px;
  text-align: center;
  font-weight: 700;
}

.container {
  max-width: 520px;
  margin: 20px auto;
  padding: 15px;
}

.card {
  background: var(--card);
  padding: 16px;
  margin-bottom: 14px;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

a {
  text-decoration: none;
  color: var(--primary);
  font-weight: 600;
}

.loading {
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
21Kaetys Blog
</div>

<div class="container">
<div id="posts" class="loading">Loading latest posts...</div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://quals21.wordpress.com/feed/"))
.then(response => response.json())
.then(data => {
  const parser = new DOMParser();
  const xml = parser.parseFromString(data.contents, "text/xml");
  const items = xml.querySelectorAll("item");

  let output = "";
  items.forEach((item, index) => {
    if (index < 5) {
      const title = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;

      output += `
        <div class="card">
          <a href="${link}" target="_blank">${title}</a>
        </div>
      `;
    }
  });

  document.getElementById("posts").innerHTML = output;
})
.catch(() => {
  document.getElementById("posts").innerHTML = "Unable to load posts. Check connection.";
});
</script>

</body>
</html>
