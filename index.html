<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>21Kaetys Blog</title>
<link rel="manifest" href="manifest.json">

<style>
:root {
  --primary: #1877f2;
  --bg: #f0f2f5;
  --card: #ffffff;
  --text: #1c1e21;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.header {
  background: var(--primary);
  padding: 16px;
  text-align: center;
  color: white;
  font-weight: 600;
  font-size: 18px;
  letter-spacing: 0.5px;
}

.container {
  padding: 16px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: var(--card);
  padding: 18px;
  margin-bottom: 14px;
  border-radius: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.05);
  transition: transform 0.1s ease;
}

.card:active {
  transform: scale(0.98);
}

a {
  text-decoration: none;
  color: var(--primary);
  font-weight: 500;
  font-size: 16px;
}

.footer {
  text-align: center;
  font-size: 12px;
  color: #65676b;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
21Kaetys Blog
</div>

<div class="container">

<div class="card">
<a href="https://quals21.wordpress.com/" target="_blank">
🌍 Visit Full Blog
</a>
</div>

<div class="card">
<a href="https://quals21.wordpress.com/category/technology/" target="_blank">
💻 Technology
</a>
</div>

<div class="card">
<a href="https://quals21.wordpress.com/category/education/" target="_blank">
📚 Education
</a>
</div>

<div class="card">
<a href="https://quals21.wordpress.com/category/scam-alert/" target="_blank">
⚠️ Scam Alerts
</a>
</div>

<div class="footer">
Install this app for faster access
</div>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
